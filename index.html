<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spaghettisaucin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .mono { font-family: 'Space Mono', monospace; }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .audio-progress {
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
        }

        .audio-progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 60;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,255,255,0.02) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1; position: fixed; pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        .page-transition { transition: opacity 0.4s ease, transform 0.4s ease; }
        .hidden-page { display: none; opacity: 0; transform: translateY(10px); }
        .active-page { display: block; opacity: 1; transform: translateY(0); }

        .filter-btn.active { background: white; color: black; border-color: white; }

        .hero-image-nav {
            width: 42px; height: 42px; object-fit: cover;
            filter: contrast(1.05); border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) { .hero-image-nav { width: 64px; height: 64px; } }

        .is-playing .play-icon { display: none; }
        .is-playing .pause-icon { display: block; }
        .pause-icon { display: none; }

        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.2); }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 10px; width: 10px;
            background: #ffffff; cursor: pointer; margin-top: -4px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body class="selection:bg-white selection:text-black">
    <div class="scanline"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 border-b border-white/5 bg-black/95 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 md:h-24 flex flex-col md:flex-row items-center justify-between gap-3 md:gap-4">
            <div class="flex items-center gap-3 md:gap-4 cursor-pointer w-full md:w-auto" onclick="showPage('home')">
                <img src="https://raw.githubusercontent.com/spaghettisaucin/spaghettisaucin.github.io/main/Bingo.jpg" alt="Profile" class="hero-image-nav rounded-sm" onerror="this.style.display='none';">
                <div class="flex flex-col">
                    <span class="text-base md:text-2xl font-bold tracking-tighter mono uppercase italic leading-none">spaghettisaucin</span>
                    <span class="text-[8px] md:text-[10px] mono uppercase tracking-[0.4em] text-white/30 mt-1">DJ / Producer</span>
                </div>
            </div>

            <div class="flex items-center justify-between md:justify-end gap-4 md:gap-10 w-full md:w-auto">
                <div class="flex items-center gap-3 bg-white/5 px-3 py-2 rounded-full border border-white/10">
                    <button onclick="toggleMute()" id="mute-btn" class="text-white/40 hover:text-white transition-colors">
                        <i data-lucide="volume-2" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
                    </button>
                    <input type="range" id="master-volume" min="0" max="1" step="0.01" value="0.8" 
                           class="w-16 md:w-24 cursor-pointer accent-white" oninput="updateVolume(this.value)">
                </div>

                <div class="flex gap-4 md:gap-10 text-[9px] md:text-[10px] mono uppercase tracking-[0.2em] text-white/40">
                    <button onclick="showPage('audio')" class="nav-link hover:text-white transition-colors">Archive</button>
                    <button onclick="showPage('home')" class="nav-link hover:text-white transition-colors">Root</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-40 md:pt-24">
        <!-- HOME PAGE -->
        <div id="page-home" class="page-transition active-page">
            <section class="min-h-[60vh] flex flex-col justify-center px-6 max-w-7xl mx-auto py-20">
                <div class="w-full flex flex-col items-center md:items-start">
                    <h2 class="mono text-[12px] md:text-[14px] uppercase tracking-[0.4em] bg-white text-black px-4 py-1.5 mb-6 ml-1 font-bold">Electronic Music</h2>
                    
                    <button onclick="showPage('audio')" class="group flex items-center justify-between w-full border border-white/20 px-6 md:px-12 py-8 md:py-10 hover:bg-white hover:text-black transition-all duration-500">
                        <span class="mono text-[10px] sm:text-[12px] md:text-[14px] font-bold tracking-[0.2em] sm:tracking-[0.6em] uppercase truncate mr-2">Enter_Audio_Archive</span>
                        <i data-lucide="arrow-right" class="w-5 h-5 md:w-6 md:h-6 group-hover:translate-x-4 transition-transform shrink-0"></i>
                    </button>
                </div>
            </section>

            <section class="py-24 px-6 border-t border-white/5 bg-zinc-950/20">
                <div class="max-w-7xl mx-auto">
                    <div class="flex items-center gap-4 mb-12">
                        <h3 class="text-xl font-bold mono italic uppercase tracking-tighter">Social_Nodes</h3>
                        <div class="h-px flex-grow bg-white/5"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <a href="https://instagram.com/zachp123_" target="_blank" class="glass-card p-10 flex flex-col gap-2 group">
                            <p class="mono text-[9px] uppercase text-[#E4405F] mb-1 font-bold tracking-widest">Instagram</p>
                            <p class="mono text-sm uppercase tracking-widest">@zachp123_</p>
                        </a>
                        <a href="https://www.youtube.com/@SpaghettiSauce0123" target="_blank" class="glass-card p-10 flex flex-col gap-2 group">
                            <p class="mono text-[9px] uppercase text-[#FF0000] mb-1 font-bold tracking-widest">YouTube</p>
                            <p class="mono text-sm uppercase tracking-widest">spaghettisauce123</p>
                        </a>
                        <a href="https://soundcloud.com/someproducer" target="_blank" class="glass-card p-10 flex flex-col gap-2 group">
                            <p class="mono text-[9px] uppercase text-[#FF3300] mb-1 font-bold tracking-widest">SoundCloud</p>
                            <p class="mono text-sm uppercase tracking-widest">spaghettisauce123</p>
                        </a>
                        <a href="https://open.spotify.com/artist/6UCQVtpJirwYJxpkgppHZO?si=dw6lCVI0RX-444QPb3hQfQ" target="_blank" class="glass-card p-10 flex flex-col gap-2 group">
                            <p class="mono text-[9px] uppercase text-[#1DB954] mb-1 font-bold tracking-widest">Spotify</p>
                            <p class="mono text-sm uppercase tracking-widest">spaghettisauce123</p>
                        </a>
                    </div>
                </div>
            </section>
        </div>

        <!-- AUDIO ARCHIVE PAGE -->
        <div id="page-audio" class="page-transition hidden-page">
            <div class="max-w-7xl mx-auto px-6 py-12 lg:flex gap-20">
                <aside class="lg:w-1/3 lg:sticky lg:top-32 lg:h-fit mb-16">
                    <button onclick="showPage('home')" class="mb-4 text-left px-5 py-3 border border-white/5 hover:border-white/20 mono text-[8px] uppercase tracking-[0.3em] text-white/30 flex items-center justify-between group w-full">
                        <span>Exit_To_Root</span>
                        <i data-lucide="corner-up-left" class="w-3 h-3 group-hover:-translate-y-1 transition-transform"></i>
                    </button>

                    <div class="mb-8 px-2">
                        <p class="mono text-[10px] uppercase tracking-wider text-white/40 leading-relaxed italic">
                            All tracks $5! Get permission for commercial use of any track. :)
                        </p>
                    </div>

                    <h2 class="text-4xl font-bold mono italic tracking-tighter uppercase leading-none mb-6">Archive.</h2>
                    <div class="flex flex-col gap-2">
                        <button onclick="filterTracks('spotlight')" class="filter-btn active text-left px-5 py-3 border border-white/10 mono text-[9px] uppercase tracking-[0.3em]">00_Spotlight</button>
                        <button onclick="filterTracks('deephouse')" class="filter-btn text-left px-5 py-3 border border-white/10 mono text-[9px] uppercase tracking-[0.3em]">01_Deep_House</button>
                        <button onclick="filterTracks('garage')" class="filter-btn text-left px-5 py-3 border border-white/10 mono text-[9px] uppercase tracking-[0.3em]">02_Garage_House</button>
                        <button onclick="filterTracks('psytrance')" class="filter-btn text-left px-5 py-3 border border-white/10 mono text-[9px] uppercase tracking-[0.3em]">03_Psytrance</button>
                        <button onclick="filterTracks('misc')" class="filter-btn text-left px-5 py-3 border border-white/10 mono text-[9px] uppercase tracking-[0.3em]">04_Misc</button>
                    </div>
                </aside>

                <div id="track-container" class="lg:w-2/3 space-y-px">
                    <!-- Tracks populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-6 flex justify-center items-center">
            <span class="mono text-[8px] text-white/20 uppercase tracking-[0.4em]">spaghettisaucin — v3.2</span>
        </div>
    </footer>

    <audio id="global-player"></audio>

    <!-- UI & Audio Player Logic -->
    <script>
        const PAYPAL_LINK = 'https://www.paypal.com/ncp/payment/GUT5AGMMRENUU';

        const TRACKS = [
            { id: 'grahj', filename: 'grahj.mp3', category: 'spotlight', color: 'text-yellow-400', label: '#Spotlight', purchaseUrl: PAYPAL_LINK },
            { id: 'dracula', filename: 'dracula.mp3', category: 'spotlight', color: 'text-yellow-400', label: '#Spotlight', purchaseUrl: PAYPAL_LINK },
            { id: 'munch', filename: 'munch.mp3', category: 'spotlight', color: 'text-yellow-400', label: '#Spotlight', purchaseUrl: PAYPAL_LINK },
            
            { id: 'festive', filename: 'festive.mp3', category: 'misc', color: 'text-blue-400', label: '#Misc', purchaseUrl: PAYPAL_LINK },
            { id: 'munch_orig', filename: 'munch.mp3', category: 'misc', color: 'text-blue-400', label: '#Misc', purchaseUrl: PAYPAL_LINK },
            { id: 'boom_boom', filename: 'boom_boom.mp3', category: 'deephouse', color: 'text-emerald-400', label: '#DeepHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'mrc', filename: 'mrc.mp3', category: 'deephouse', color: 'text-emerald-400', label: '#DeepHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'donk', filename: 'donk.mp3', category: 'garage', color: 'text-pink-400', label: '#GarageHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'lasah', filename: 'lasah.mp3', category: 'garage', color: 'text-pink-400', label: '#GarageHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'dracula_orig', filename: 'dracula.mp3', category: 'deephouse', color: 'text-emerald-400', label: '#DeepHouse', purchaseUrl: PAYPAL_LINK },
            { id: '123', filename: '123.mp3', category: 'garage', color: 'text-pink-400', label: '#GarageHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'smartfella', filename: 'smartfella.mp3', category: 'garage', color: 'text-pink-400', label: '#GarageHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'teet', filename: 'teet.mp3', category: 'deephouse', color: 'text-emerald-400', label: '#DeepHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'buffet', filename: 'buffet.mp3', category: 'deephouse', color: 'text-emerald-400', label: '#DeepHouse', purchaseUrl: PAYPAL_LINK },
            { id: 'psytranceeee', filename: 'psytranceeee.mp3', category: 'psytrance', color: 'text-indigo-400', label: '#Psytrance', purchaseUrl: PAYPAL_LINK },
            { id: 'parttwo', filename: 'parttwo.mp3', category: 'psytrance', color: 'text-indigo-400', label: '#Psytrance', purchaseUrl: PAYPAL_LINK },
            { id: 'grahj_orig', filename: 'grahj.mp3', category: 'garage', color: 'text-pink-400', label: '#GarageHouse', purchaseUrl: PAYPAL_LINK }
        ];

        let currentBtn = null;
        let lastVolume = 0.8;
        const player = document.getElementById('global-player');
        player.volume = 0.8;

        function renderTracks() {
            const container = document.getElementById('track-container');
            container.innerHTML = '';
            TRACKS.forEach(track => {
                const html = `
                    <div class="track-item border-b border-white/5 hover:bg-white/[0.02] py-8 px-4" 
                         data-category="${track.category}" data-filename="${track.filename}" data-id="${track.id}">
                        <div class="flex items-center gap-6">
                            <button onclick="toggleTrack(this, 'https://raw.githubusercontent.com/spaghettisaucin/spaghettisaucin.github.io/main/${track.filename}')" 
                                    class="play-btn w-12 h-12 rounded-full border border-white/10 flex items-center justify-center hover:bg-white hover:text-black shrink-0">
                                <i data-lucide="play" class="play-icon w-4 h-4 ml-0.5"></i>
                                <i data-lucide="pause" class="pause-icon w-4 h-4"></i>
                            </button>
                            <div class="flex-grow min-w-0">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h4 class="text-sm font-bold mono tracking-widest uppercase truncate">${track.id.replace('_orig', '')}</h4>
                                        <div class="flex gap-4 mt-1 text-[8px] mono uppercase text-white/30">
                                            <span class="${track.color}">${track.label}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <span class="time-display mono text-[10px] text-white/20">00:00</span>
                                        <a href="${track.purchaseUrl}" target="_blank" class="shrink-0 flex items-center gap-2 px-3 py-1.5 bg-white/5 border border-white/10 hover:bg-white hover:text-black transition-all rounded-sm">
                                            <span class="mono text-[8px] uppercase tracking-tighter font-bold">Buy_$5</span>
                                            <i data-lucide="credit-card" class="w-3 h-3"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="audio-progress w-full mt-4" onclick="seek(event, this)">
                                    <div class="audio-progress-fill"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
            filterTracks('spotlight');
        }

        function toggleTrack(btn, file) {
            const trackItem = btn.closest('.track-item');
            if (currentBtn === btn) {
                if (player.paused) { 
                    player.play(); 
                    trackItem.classList.add('is-playing');
                } else { 
                    player.pause(); 
                    trackItem.classList.remove('is-playing');
                }
                return;
            }
            if (currentBtn) currentBtn.closest('.track-item').classList.remove('is-playing');
            currentBtn = btn;
            player.src = file;
            player.play();
            trackItem.classList.add('is-playing');
        }

        function seek(event, el) {
            if (!currentBtn || isNaN(player.duration)) return;
            player.currentTime = ((event.clientX - el.getBoundingClientRect().left) / el.offsetWidth) * player.duration;
        }

        function filterTracks(category) {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('onclick').includes(`'${category}'`));
            });
            const container = document.getElementById('track-container');
            const tracks = Array.from(container.getElementsByClassName('track-item'));
            
            // Randomize order unless it's spotlight (to maintain the requested order)
            if (category !== 'spotlight') {
                for (let i = tracks.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
                }
            } else {
                // Sort spotlight by current array order
                tracks.sort((a, b) => {
                    const idxA = TRACKS.findIndex(t => t.id === a.dataset.id);
                    const idxB = TRACKS.findIndex(t => t.id === b.dataset.id);
                    return idxA - idxB;
                });
            }

            tracks.forEach(track => {
                container.appendChild(track);
                const match = track.dataset.category === category;
                track.style.display = match ? 'block' : 'none';
            });
        }

        function showPage(pageId) {
            window.scrollTo(0, 0);
            document.querySelectorAll('.page-transition').forEach(p => {
                p.classList.toggle('active-page', p.id === `page-${pageId}`);
                p.classList.toggle('hidden-page', p.id !== `page-${pageId}`);
            });
            if(pageId === 'audio') filterTracks('spotlight');
        }

        function updateVolume(val) { player.volume = val; lastVolume = val; updateVolumeIcon(val); }
        function toggleMute() {
            if (player.volume > 0) { lastVolume = player.volume; player.volume = 0; document.getElementById('master-volume').value = 0; } 
            else { player.volume = lastVolume || 0.8; document.getElementById('master-volume').value = player.volume; }
            updateVolumeIcon(player.volume);
        }
        function updateVolumeIcon(val) {
            const icon = document.querySelector('#mute-btn i');
            if (val == 0) icon.setAttribute('data-lucide', 'volume-x');
            else if (val < 0.5) icon.setAttribute('data-lucide', 'volume-1');
            else icon.setAttribute('data-lucide', 'volume-2');
            lucide.createIcons();
        }

        player.ontimeupdate = () => {
            if (!currentBtn || isNaN(player.duration)) return;
            const trackItem = currentBtn.closest('.track-item');
            const progressFill = trackItem.querySelector('.audio-progress-fill');
            const timeDisplay = trackItem.querySelector('.time-display');
            progressFill.style.width = `${(player.currentTime / player.duration) * 100}%`;
            const mins = Math.floor(player.currentTime / 60);
            const secs = Math.floor(player.currentTime % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${mins}:${secs}`;
        };

        player.onended = () => {
            if (currentBtn) {
                const currentTrackItem = currentBtn.closest('.track-item');
                currentTrackItem.classList.remove('is-playing');
                const allVisible = Array.from(document.querySelectorAll('.track-item')).filter(t => t.style.display !== 'none');
                const idx = allVisible.indexOf(currentTrackItem);
                if (idx < allVisible.length - 1) allVisible[idx+1].querySelector('.play-btn').click();
            }
        };

        window.onload = () => {
            lucide.createIcons();
            renderTracks();
        }
    </script>
</body>
</html>
